# Rôle nodejs — NVM + Node {{ nodejs_version }} + PM2
- name: Installer NVM
  ansible.builtin.shell: |
    curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
  args:
    creates: "{{ app_home }}/.nvm/nvm.sh"
  become_user: "{{ app_user }}"
  environment:
    HOME: "{{ app_home }}"

- name: Installer Node.js {{ nodejs_version }}
  ansible.builtin.shell: |
    . "{{ app_home }}/.nvm/nvm.sh"
    nvm install {{ nodejs_version }}
    nvm use {{ nodejs_version }}
    nvm alias default {{ nodejs_version }}
    node -v
  args:
    executable: /bin/bash
    creates: "{{ app_home }}/.nvm/alias/default"
  become_user: "{{ app_user }}"
  environment:
    HOME: "{{ app_home }}"

- name: Installer PM2 globalement
  ansible.builtin.shell: |
    . "{{ app_home }}/.nvm/nvm.sh"
    npm install -g pm2
    pm2 --version
  args:
    executable: /bin/bash
  become_user: "{{ app_user }}"
  environment:
    HOME: "{{ app_home }}"
  register: pm2_install
  changed_when: pm2_install.rc == 0

- name: Créer script wrapper pour PM2/Node (pour cron/root)
  ansible.builtin.copy:
    dest: /usr/local/bin/gnv-pm2
    mode: "0755"
    content: |
      #!/bin/bash
      export NVM_DIR="{{ app_home }}/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
      export PATH="$NVM_DIR/versions/node/$(ls "$NVM_DIR/versions/node" 2>/dev/null | head -1)/bin:$PATH"
      exec pm2 "$@"
  when: app_user != 'root'
