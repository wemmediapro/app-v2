# Rôle mongodb — MongoDB 7 sur Ubuntu 22.04
- name: Clé GPG MongoDB 7
  ansible.builtin.get_url:
    url: https://www.mongodb.org/static/pgp/server-7.0.asc
    dest: /usr/share/keyrings/mongodb-server-7.0.gpg
    force: true
  register: gpg_key
  changed_when: gpg_key.dest is changed or gpg_key.checksum is changed

- name: Dépôt APT MongoDB 7
  ansible.builtin.apt_repository:
    repo: "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse"
    filename: mongodb-org-7.0
    state: present
  when: gpg_key is changed or mongodb_apt_repo_added is not defined

- name: Cache apt
  ansible.builtin.apt:
    update_cache: true

- name: Installation MongoDB
  ansible.builtin.apt:
    name: mongodb-org
    state: present

- name: Démarrer et activer mongod
  ansible.builtin.systemd:
    name: mongod
    state: started
    enabled: true
    daemon_reload: true

- name: Vérifier MongoDB
  ansible.builtin.command: mongosh --eval "db.version()"
  register: mongodb_version
  changed_when: false
  failed_when: mongodb_version.rc != 0
