# Variables Ansible — GNV OnBoard (group_vars/all.yml)

# Répertoire de déploiement sur le serveur
app_deploy_path: /var/www/gnv-app

# Utilisateur qui exécute l'app (PM2) — par défaut l'utilisateur SSH
app_user: "{{ ansible_user }}"
# Répertoire home de cet utilisateur (pour NVM, PM2)
app_home: "{{ '/root' if app_user == 'root' else '/home/' + app_user }}"

# Branche ou commit Git (si déploiement par git)
app_git_repo: ""  # ex: https://github.com/votre-org/app3.git
app_git_version: main

# Base de données MongoDB
mongodb_uri: "mongodb://localhost:27017/gnv_onboard?directConnection=true"
# Pour Atlas : mongodb_uri: "mongodb+srv://user:pass@cluster.mongodb.net/gnv_onboard?retryWrites=true&w=majority"

# Redis
redis_uri: "redis://localhost:6379"

# Domaine / server_name Nginx
nginx_server_name: "votre-domaine.com"  # ou IP

# Servir /uploads/ (vidéo, audio) directement par Nginx au lieu de Node — démarrage plus rapide
nginx_serve_uploads_static: true

# JWT (production : à surcharger en --extra-vars ou vault)
jwt_secret: "change-me-in-production"
admin_password: "admin123"
admin_email: "admin@gnv.com"

# Node.js version (nvm)
nodejs_version: "20"
