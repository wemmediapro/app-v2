# Cibles par défaut : API Node sur la machine hôte (port 3000).
# Linux : docker compose définit extra_hosts host.docker.internal:host-gateway.
# Si l’API tourne dans Docker sur le réseau gnv-onboard, remplacer les targets par
# gnv-backend:3000 et joindre le réseau externe (voir docker-compose.yml).

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: blackbox
    metrics_path: /probe
    params:
      module: [http_api_health]
    static_configs:
      - targets:
          - http://host.docker.internal:3000/api/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: backend
    metrics_path: /metrics
    honor_labels: true
    static_configs:
      - targets: ["host.docker.internal:3000"]
        labels:
          service: gnv-backend

  # Optionnel : décommenter + service cadvisor dans docker-compose.yml (Linux / Docker Desktop)
  # - job_name: cadvisor
  #   static_configs:
  #     - targets: ["cadvisor:8080"]
