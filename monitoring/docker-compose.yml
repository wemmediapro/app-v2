# Stack observabilité locale : Prometheus + Grafana + Alertmanager + Blackbox.
#
# Prérequis API sur l’hôte : port 3000, PROMETHEUS_METRICS_ENABLED=1 pour le job « backend ».
#
# Démarrage (depuis ce dossier) :
#   cd monitoring && docker compose up -d
#
# UIs (bind loopback) :
#   Prometheus    http://127.0.0.1:9090
#   Grafana       http://127.0.0.1:3001  (admin / mot de passe : GRAFANA_ADMIN_PASSWORD)
#   Alertmanager  http://127.0.0.1:9093
#
# Joindre le réseau Docker de l’app (optionnel) pour cibles gnv-backend:3000 :
#   docker network connect gnv-onboard_gnv_internal gnv-monitoring-prometheus-1
# Puis éditer prometheus.yml (targets) en conséquence.

name: gnv-monitoring

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: gnv-prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - blackbox-exporter
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.26.0
    container_name: gnv-blackbox
    volumes:
      - ./blackbox/blackbox.yml:/config/blackbox.yml:ro
    command:
      - --config.file=/config/blackbox.yml
    ports:
      - "127.0.0.1:9115:9115"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: gnv-alertmanager
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "127.0.0.1:9093:9093"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    container_name: gnv-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3000"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://127.0.0.1:3001}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
