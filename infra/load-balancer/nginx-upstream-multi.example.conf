# =============================================================================
# Exemple d’upstream Nginx — plusieurs instances Node derrière un load balancer
# =============================================================================
# Intégration : remplacer dans nginx.conf (racine du dépôt) le bloc :
#   upstream backend { ... }
# par le bloc ci-dessous (ajuster les adresses / ports).
#
# Cas d’usage typiques :
#   • Plusieurs VM / conteneurs, chacun écoutant sur :3000 (IP différentes).
#   • Plusieurs processus Node sur des ports distincts (3000–3003) sans partage
#     de port au niveau OS (pas le mode cluster PM2 sur un seul port).
#
# PM2 cluster (ecosystem.production.cjs) : toutes les instances partagent souvent
# le même PORT=3000 — dans ce cas, un seul "server 127.0.0.1:3000" suffit et
# c’est PM2 qui répartit. Utilisez plusieurs lignes "server" seulement si vous
# avez réellement plusieurs cibles réseau.
#
# Socket.io : avec l’adapter Redis (backend), la répartition round-robin / least_conn
# entre nœuds est correcte sans ip_hash. Sans Redis, préférer ip_hash sur le
# bloc upstream (voir variante commentée) ou un seul nœud.
#
# Voir aussi : nginx.conf (locations /api/, /socket.io/ déjà prêtes pour proxy).

upstream backend {
    least_conn;

    server 10.0.1.10:3000 max_fails=3 fail_timeout=30s;
    server 10.0.1.11:3000 max_fails=3 fail_timeout=30s;
    server 10.0.1.12:3000 max_fails=3 fail_timeout=30s;

    # Décommenter pour activer un quatrième nœud :
    # server 10.0.1.13:3000 max_fails=3 fail_timeout=30s backup;

    keepalive 256;
    keepalive_requests 500;
    keepalive_timeout 60s;
}

# --- Variante affinité client (sticky par IP) — si pas d’adapter Redis Socket.io ---
# upstream backend {
#     ip_hash;
#     server 10.0.1.10:3000 max_fails=3 fail_timeout=30s;
#     server 10.0.1.11:3000 max_fails=3 fail_timeout=30s;
#     keepalive 64;
# }

# --- Variante poids déségal (machine plus grande) ---
# server 10.0.1.10:3000 weight=3 max_fails=3 fail_timeout=30s;
# server 10.0.1.11:3000 weight=1 max_fails=3 fail_timeout=30s;
