# =============================================================================
# HAProxy — load balancer HTTP/HTTPS (API + WebSocket Socket.io sur même port)
# =============================================================================
# Vérification : haproxy -c -f haproxy.example.cfg
#
# Adapter : chemins SSL, IP:port des nœuds, Host du healthcheck si votre API l’exige.
# Socket.io multi-instances : Redis adapter côté Node (comme avec nginx.conf).

global
    log stdout format raw local0
    maxconn 50000
    tune.ssl.default-dh-param 2048

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option forwardfor
    http-reuse safe
    timeout connect 5s
    timeout client  300s
    timeout server  300s
    timeout tunnel  3600s

# Stats (restreindre en prod : bind 127.0.0.1:8404 + mot de passe)
listen stats
    bind 127.0.0.1:8404
    stats enable
    stats uri /stats
    stats refresh 10s

frontend fe_http
    bind *:80
    http-request redirect scheme https code 301

frontend fe_https
    bind *:443 ssl crt /etc/haproxy/certs/votre-site.pem alpn h2,http/1.1
    http-request set-header X-Forwarded-Proto https

    default_backend be_nodejs

backend be_nodejs
    balance leastconn
    option httpchk GET /api/health
    http-check expect status 200
    default-server inter 5s rise 2 fall 3

    server n1 10.0.1.10:3000 check
    server n2 10.0.1.11:3000 check
    server n3 10.0.1.12:3000 check

# Notes :
# - Si l’API exige un Host précis pour /api/health, utiliser HAProxy 2.4+ :
#     option httpchk
#     http-check send meth GET uri /api/health hdr Host votre-domaine.tld
#     http-check expect status 200
# - Certificat : PEM selon la doc HAProxy de votre distro (fullchain + clé).
# - WebSocket : en mode http, Upgrade est relayé vers le même backend.
