# Déploiement : kubectl apply -k k8s/
# Puis créer les secrets (non inclus ici) :
#   cp k8s/secret.example.yaml k8s/secret.local.yaml && éditer && kubectl apply -f k8s/secret.local.yaml
#
# Certificat TLS Ingress (ex. cert-manager) : créer le secret gnv-api-tls dans gnv-onboard
# ou retirer la section tls de ingress.yaml pour tests HTTP.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gnv-onboard

resources:
  - namespace.yaml
  - configmap.yaml
  - redis.yaml
  - deployment-backend.yaml
  - service-backend.yaml
  - ingress.yaml
  - hpa.yaml

# Pour surcharger l’image sans éditer le Deployment :
#   kustomize edit set image your-registry/gnv-backend=ghcr.io/org/gnv-backend:1.0.0
