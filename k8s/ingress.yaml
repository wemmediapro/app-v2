# Nécessite un contrôleur Ingress (ex. ingress-nginx). Adapter host + tls secret.
# Timeouts allongés pour Socket.io (même chemin que l’API).

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gnv-backend
  namespace: gnv-onboard
  labels:
    app.kubernetes.io/name: gnv-backend
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.example.com
      secretName: gnv-api-tls
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: gnv-backend
                port:
                  name: http
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gnv-backend
                port:
                  name: http
