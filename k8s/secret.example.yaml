# Copier vers un fichier non versionné puis appliquer :
#   cp k8s/secret.example.yaml k8s/secret.local.yaml
#   # éditer k8s/secret.local.yaml
#   kubectl apply -f k8s/secret.local.yaml
#
# Ne jamais committer de vrais secrets.

apiVersion: v1
kind: Secret
metadata:
  name: gnv-secrets
  namespace: gnv-onboard
  labels:
    app.kubernetes.io/name: gnv-backend
type: Opaque
stringData:
  # MongoDB (Atlas, ou service interne)
  mongodb-uri: "mongodb+srv://USER:PASSWORD@cluster.mongodb.net/gnv_onboard?retryWrites=true&w=majority"
  # Redis : même mot de passe que redis-password ci-dessous
  redis-uri: "redis://:CHANGEME_REDIS_PASS@redis:6379"
  redis-password: "CHANGEME_REDIS_PASS"
  jwt-secret: "remplacer-par-une-chaine-d-au-moins-32-caracteres"
  admin-email: "admin@example.com"
  admin-password: "remplacer-mot-de-passe-fort"
  # Optionnel prod
  sentry-dsn: ""
