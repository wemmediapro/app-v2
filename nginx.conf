# Configuration Nginx — GNV OnBoard
# Copier vers /etc/nginx/sites-available/gnv-app puis :
#   sudo ln -s /etc/nginx/sites-available/gnv-app /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# À ajouter dans /etc/nginx/nginx.conf (bloc global, au-dessus de include sites-enabled/) pour 2000+ connexions :
#
#   worker_processes auto;
#   worker_rlimit_nofile 65535;
#   events {
#     worker_connections 4096;
#     use epoll;        # Linux uniquement ; sur macOS supprimer cette ligne
#     multi_accept on;
#   }
#
# Remplacer votre-domaine.com par votre domaine ou l'IP du serveur.

# Backend (Node/PM2 sur le port 3000)
upstream backend {
    least_conn;
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    keepalive 256;
    keepalive_requests 500;
    keepalive_timeout 60s;
}

# Proxy cache pour les réponses API publiques (GET uniquement)
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m max_size=200m inactive=10m use_temp_path=off;

# En production : frontend et dashboard sont servis en statique par Nginx (plus de vite preview).
# Remplacer /var/www/app-v2 par votre chemin de déploiement (ex. DEPLOY_PATH ou /var/www/app-v2).
# Build : npm run build (frontend → dist/) et cd dashboard && npm run build (dashboard → dashboard/dist/).
# set $app_root /var/www/app-v2;

server {
    listen 80;
    listen [::]:80;
    server_name travelstream.fr www.travelstream.fr;

    client_max_body_size 100M;

    # WebSocket Socket.io
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API Backend
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Cache des GET publics (restaurants, radio, magazine...) — 60s
        proxy_cache api_cache;
        proxy_cache_methods GET;
        proxy_cache_valid 200 60s;
        proxy_cache_bypass $http_authorization;
        proxy_no_cache $http_authorization;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Uploads / streaming (vidéo, audio, images, HLS) — servis directement par Nginx (sendfile + aio)
    # Remplacer /var/www/app-v2/backend/public/uploads par le chemin réel des uploads sur le serveur
    location /uploads/ {
        alias /var/www/app-v2/backend/public/uploads/;
        sendfile on;
        aio on;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=3600";
    }

    # Streaming vidéo/audio via API (premier octet plus rapide, pas de buffer requête)
    location /api/stream/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Dashboard admin — contenu statique (build: cd dashboard && npm run build)
    # Vite base doit être '/dashboard/' pour que les assets soient sous /dashboard/assets/...
    location /dashboard/ {
        alias /var/www/app-v2/dashboard/dist/;
        try_files $uri $uri/ /dashboard/index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }
    location = /dashboard {
        return 301 /dashboard/;
    }

    # Frontend principal (app passagers) — contenu statique (build: npm run build)
    # Cache long pour assets buildés (Vite outputs hashés — safe pour cache long)
    # (?!dashboard/) : exclut /dashboard/ pour que l'alias /dashboard/ serve le build dashboard
    location ~* ^/(?!dashboard/).*\.(?:js|mjs|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        root /var/www/app-v2/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        root /var/www/app-v2/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/wasm;

    # Brotli (meilleure compression que gzip pour JS/CSS, gain ~15-20% sur les assets)
    # Nécessite ngx_brotli (apt install libnginx-mod-brotli ou compilation avec --add-module)
    brotli on;
    brotli_comp_level 6;
    brotli_min_length 1024;
    brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/wasm;

    # HSTS + autres headers de sécurité
    # HSTS — force HTTPS (2 ans) + sous-domaines + preload
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}

# Redirection HTTPS → HTTP (en attendant certificat Let's Encrypt)
# Pour activer le vrai HTTPS : certbot --nginx -d travelstream.fr -d www.travelstream.fr
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name travelstream.fr www.travelstream.fr;
    ssl_certificate     /etc/nginx/ssl/travelstream-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/travelstream-selfsigned.key;
    return 301 http://$host$request_uri;
}
