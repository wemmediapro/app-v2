<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNV Backend - API Dashboard</title>
    <link rel="stylesheet" href="/public/api-dashboard.css">
</head>
<body>
    <div class="container">
        <h1>🚀 GNV Backend API</h1>
        <p class="subtitle">API REST pour l'application GNV Onboard</p>

        <div>
            <span class="status online" id="status">● En ligne</span>
            <span class="mode-badge mode-demo" id="mode">🎭 Mode Démo</span>
        </div>

        <div class="info">
            <strong>📍 Base URL:</strong> <code id="base-url">/api</code><br>
            <strong>🌐 Origine:</strong> <code id="origin"></code><br>
            <strong>📊 Health Check:</strong> <a href="/api/health" target="_blank" rel="noopener">/api/health</a>
        </div>

        <h2>📡 Endpoints Disponibles</h2>
        <div class="endpoints" id="endpoints">
        </div>
    </div>

    <script src="/public/api-dashboard.js"></script>
</body>
</html>
