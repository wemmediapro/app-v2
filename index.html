<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚢</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#0E8BFE" />
    <meta name="description" content="Portail des services à bord. Fonctionne hors ligne." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: http: data: blob:; script-src 'self' blob:; style-src 'self' 'unsafe-inline'; connect-src 'self' https: http: ws: wss:;">
    <title>GNV OnBoard App</title>
    <style>
      /* Style de chargement initial */
      #root {
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #loading {
        color: white;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 500;
        letter-spacing: 0.02em;
        text-align: center;
      }
      #loading::after {
        content: '...';
        animation: dots 1.5s steps(4, end) infinite;
      }
      @keyframes dots {
        0%, 20% { content: '.'; }
        40% { content: '..'; }
        60%, 100% { content: '...'; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading">Chargement de l'application</div>
    </div>
    <script nonce="__CSP_NONCE__" src="/loading-init.js"></script>
    <script type="module" nonce="__CSP_NONCE__" src="/src/main.jsx"></script>
  </body>
</html>
