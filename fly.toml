# Fly.io configuration for GNV Backend
# Documentation: https://fly.io/docs/reference/configuration/

app = "gnv-backend"
primary_region = "cdg"  # Paris (changez selon votre région)

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory_mb = 256
  cpu_kind = "shared"
  cpus = 1


