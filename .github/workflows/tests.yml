# CI — tests frontend (Vitest + Playwright), backend (Jest), charge légère (PR), audit npm
name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Dépendances (racine)
        run: npm ci

      - name: Lint frontend
        run: npm run lint || true

      - name: Format check frontend
        run: npm run format:check || true

      - name: Vitest — couverture
        run: npm run test:coverage

      - name: Dépendances backend (e2e + API)
        working-directory: backend
        run: npm ci

      - name: Démarrer le backend
        working-directory: backend
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/gnv_ci_e2e
          NODE_ENV: development
          JWT_SECRET: ci-e2e-jwt-secret-at-least-32-chars-long!!
          ADMIN_EMAIL: admin@ci-e2e.test
          ADMIN_PASSWORD: CiE2eStrong1!@#
          RATE_LIMIT_LOAD_TEST: '1'
          PORT: '3000'
        run: |
          node server.js &
          echo $! > /tmp/gnv-backend-e2e.pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3000/api/health > /dev/null; then
              echo "Backend prêt"
              exit 0
            fi
            sleep 2
          done
          echo "Timeout /api/health"
          exit 1

      - name: Vite dev (proxy /api → backend pour e2e)
        run: |
          npm run dev -- --host 127.0.0.1 --port 5173 &
          echo $! > /tmp/gnv-preview.pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:5173/ > /dev/null; then
              echo "Vite prêt"
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Playwright — navigateurs
        run: npx playwright install --with-deps chromium

      - name: Playwright — e2e (chromium uniquement en CI)
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
          CI: 'true'
        run: npm run test:e2e -- --project=chromium

      - name: Upload rapport Playwright
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload couverture frontend → Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Arrêt backend / preview
        if: always()
        run: |
          [ -f /tmp/gnv-backend-e2e.pid ] && kill "$(cat /tmp/gnv-backend-e2e.pid)" 2>/dev/null || true
          [ -f /tmp/gnv-preview.pid ] && kill "$(cat /tmp/gnv-preview.pid)" 2>/dev/null || true

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Lint backend
        run: npm run lint || true

      - name: Format check backend
        run: npm run format:check || true

      - name: Jest (avec couverture)
        run: npm run test

      - name: Upload couverture backend → Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false

  load-tests-pr:
    name: Load Tests (k6, PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - uses: grafana/setup-k6-action@v1

      - name: Dépendances backend
        working-directory: backend
        run: npm ci

      - name: Dépendances racine (k6 script)
        run: npm ci

      - name: Démarrer le backend
        working-directory: backend
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/gnv_load_pr
          NODE_ENV: development
          JWT_SECRET: ci-load-pr-jwt-secret-at-least-32-chars
          ADMIN_EMAIL: admin@load-pr.test
          ADMIN_PASSWORD: LoadPrStrong1!@#
          RATE_LIMIT_LOAD_TEST: '1'
          MAX_CONNECTIONS_PER_IP: '5000'
          PORT: '3000'
        run: |
          node server.js &
          echo $! > /tmp/gnv-backend-load.pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3000/api/health > /dev/null; then
              echo "Backend prêt"
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: k6 — profil CI (~100 VUs)
        env:
          API_URL: http://127.0.0.1:3000
          LOAD_PROFILE: ci
          CI: 'true'
          GITHUB_ACTIONS: 'true'
        run: k6 run tests/load/gnv-1500-connections.js

      - name: Arrêt backend
        if: always()
        run: |
          [ -f /tmp/gnv-backend-load.pid ] && kill "$(cat /tmp/gnv-backend-load.pid)" 2>/dev/null || true

  security-scan:
    name: Security Scan (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Audit racine (moderate → fail)
        run: npm audit --audit-level=moderate

      - name: Dépendances backend
        working-directory: backend
        run: npm ci

      - name: Audit backend (moderate → fail)
        working-directory: backend
        run: npm audit --audit-level=moderate
