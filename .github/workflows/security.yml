# Scans sécurité planifiés + manuel (audit npm, OWASP Dependency-Check, Snyk optionnel)
name: Security

on:
  schedule:
    - cron: '0 6 * * *' # quotidien 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  HUSKY: '0'
  NPM_CONFIG_FUND: 'false'

jobs:
  npm-audit:
    name: npm audit (racine + backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Audit racine — moderate
        run: npm audit --audit-level=moderate

      - name: Audit backend — moderate
        working-directory: backend
        run: |
          npm ci
          npm audit --audit-level=moderate

  owasp-dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # SHA figé (déc. 2025) — évite @main mutable côté supply chain
      - name: Dependency-Check
        uses: dependency-check/Dependency-Check_Action@1e54355a8b4c8abaa8cc7d0b70aa655a3bb15a6c
        with:
          project: 'GNV OnBoard'
          path: '.'
          format: 'HTML'
          out: 'reports-dependency-check'
          args: '--exclude "**/node_modules/**"'
        continue-on-error: true

      - name: Upload rapport OWASP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports-dependency-check/
          if-no-files-found: ignore

  snyk:
    name: Snyk (optionnel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - run: npm ci
      - working-directory: backend
        run: npm ci

      - name: Snyk test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "SNYK_TOKEN absent — étape ignorée (ajoutez le secret pour activer Snyk)."
            exit 0
          fi
          npm install -g snyk
          snyk test --severity-threshold=high || true
          (cd backend && snyk test --severity-threshold=high) || true
          echo "Snyk exécuté (continue-on-error côté CLI pour ne pas bloquer le cron)."
