name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  install-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --workspaces --if-present

  test-backend:
    runs-on: ubuntu-latest
    needs: install-and-lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install backend deps
        run: npm ci
      - name: Run backend tests
        run: npm --prefix backend test --if-present

  build-frontend:
    runs-on: ubuntu-latest
    needs: install-and-lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Build root frontend
        run: npm run build --if-present
      - name: Build dashboard (if exists)
        run: |
          if [ -d "dashboard" ]; then
            npm --prefix dashboard install
            npm --prefix dashboard run build
          else
            echo "dashboard absent, skip"
          fi

  audit:
    runs-on: ubuntu-latest
    needs: [install-and-lint]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: npm audit
        run: npm audit --audit-level=high || true
