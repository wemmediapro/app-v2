name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  install-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root deps
        run: npm ci
      - name: Lint (root)
        run: npm run lint --workspaces --if-present

  test-backend:
    runs-on: ubuntu-latest
    needs: install-and-lint
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Run backend tests
        run: npm --prefix backend test --if-present

  build-frontend:
    runs-on: ubuntu-latest
    needs: install-and-lint
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Build frontend (root)
        run: npm run build --if-present
      - name: Build dashboard
        run: npm --prefix dashboard run build --if-present

  audit:
    runs-on: ubuntu-latest
    needs: [install-and-lint]
    steps:
      - uses: actions/checkout@v4
      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm audit
        run: npm audit --audit-level=high || true
