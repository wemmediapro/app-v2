# Déploiement staging — branche develop (Heroku / Railway via secrets)
# Ne se déclenche que si des chemins applicatifs changent (évite déploiements inutiles).
name: Deploy Staging

on:
  push:
    branches: [develop]
    paths:
      - 'src/**'
      - 'public/**'
      - 'backend/**'
      - 'dashboard/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tailwind.config.*'
      - 'postcss.config.*'
      - 'index.html'
      - 'Dockerfile'
      - '.github/workflows/deploy-staging.yml'

permissions:
  contents: read
  actions: write

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  HUSKY: '0'
  NPM_CONFIG_FUND: 'false'

jobs:
  pre-deploy-tests:
    name: Tests (gate avant déploiement)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            dashboard/package-lock.json

      - name: Frontend — Vitest couverture
        run: |
          npm ci
          npm run test:coverage

      - name: Backend — Jest
        working-directory: backend
        run: |
          npm ci
          npm run test

      - name: TypeScript (racine + backend + dashboard)
        run: |
          npm ci --prefix dashboard
          npm run typecheck

      - name: Audits npm (moderate)
        run: npm audit --audit-level=moderate
      - name: Audit backend
        working-directory: backend
        run: npm audit --audit-level=moderate

  build-frontend:
    name: Build frontend (Vite)
    runs-on: ubuntu-latest
    needs: [pre-deploy-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

  build-backend:
    name: Build backend (sanity)
    runs-on: ubuntu-latest
    needs: [pre-deploy-tests]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Syntaxe server.js
        run: node --check server.js

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    environment:
      name: staging
      url: ${{ vars.STAGING_PUBLIC_URL }}
    if: vars.STAGING_DEPLOY_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Placeholder déploiement
        run: |
          echo "STAGING_DEPLOY_ENABLED=true : ajoutez ici Heroku, Railway, Fly.io, etc."
          echo "Secrets typiques : HEROKU_API_KEY, RAILWAY_TOKEN, STAGING_SSH_KEY"

  smoke-staging:
    name: Smoke tests staging
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: success() && vars.STAGING_DEPLOY_ENABLED == 'true' && vars.STAGING_PUBLIC_URL != ''
    steps:
      - name: Readiness check
        run: |
          curl -sfS "${{ vars.STAGING_PUBLIC_URL }}/api/v1/health/ready" | head -c 500
          echo ""
